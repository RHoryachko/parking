# PostgreSQL + API. For local SQLite without Docker use: .\run_local.ps1
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
      POSTGRES_DB: parking
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://parking:parking@db:5432/parking
      JWT_SECRET: dev-change-me-in-production
      JWT_ALG: HS256
      JWT_EXPIRES_MIN: "60"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://127.0.0.1:8080,http://localhost:8080
      APP_PUBLIC_API_URL: ${APP_PUBLIC_API_URL:-http://127.0.0.1:8000}
      CLIENT_APP_WEB_URL: ${CLIENT_APP_WEB_URL:-http://127.0.0.1:8080}
      # Empty → LiqPay result CLIENT_APP_WEB_URL/payment-success?booking_id=…
      LIQPAY_RESULT_URL: ${LIQPAY_RESULT_URL:-}
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY:-}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
